name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ubuntu-latest already has Android SDK, platform-tools,
      # build-tools;34.0.0, and platforms;android-34 pre-installed.
      # We just need to point AGP at it.
      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Debug SDK layout
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          ls "$ANDROID_HOME"
          ls "$ANDROID_HOME/build-tools" || true
          ls "$ANDROID_HOME/platforms"   || true

      - name: Download Gradle 8.6
        run: |
          curl -sL https://services.gradle.org/distributions/gradle-8.6-bin.zip \
               -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/gradle

      - name: Build debug APK
        run: /opt/gradle/gradle-8.6/bin/gradle assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: audio-visualizer-${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
